experiment_name: "visec_best_baseline"

dataset:
  name: "visec"
  args:
    hf_id: "hustep-lab/ViSEC"
    batch_size: 16                  # RESTORED: Original stable batch size (16 instead of 8)
    num_workers: 4
    target_size: [244, 244]         # RESTORED: Original target size (244 instead of 224)
    spec_augment:
      freq_mask_param: 27
      time_mask_param: 100          # RESTORED: Original strong time mask (100 instead of 30)
      num_freq_masks: 1
      num_time_masks: 1
      prob: 0.5
    waveform_augment:
      prob: 0.6                       # Xác suất kích hoạt cả khối (Probability of Pipeline)
      pitch_shift:
        weight: 0.4                   # Trọng số 40%
        n_steps_range: [-1.0, 1.0]    # Dịch cao độ [-1.0, 1.0] semitones
      noise_injection:
        weight: 0.4                   # Trọng số 40%
        noise_factor_range: [0.001, 0.015] # Nhiễu trắng
      time_shift:
        weight: 0.2                   # Trọng số 20%
        range: [0.9, 1.1]             # Tốc độ [0.9, 1.1]

model:
  name: "maxmvit_mlp"
  type: "crossattn"                 # RESTORED: Original Cross-Attention fusion (crossattn instead of gmu)
  num_classes: 4
  hidden_size: 512
  dropout_rate: 0.2
  num_heads: 8
  fusion_type: "concat"

training:
  epochs: 50
  lr: 0.0002                        # RESTORED: Original learning rate (0.0002 instead of 0.00015)
  patience: 10
  seed: 42
  device: "cuda"
  scheduler:
    factor: 0.1
    patience: 3
    min_lr: 1e-6

paths:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
