experiment_name: "visec_best_baseline"

dataset:
  name: "visec"
  args:
    hf_id: "hustep-lab/ViSEC"
    batch_size: 16                  # RESTORED: Original stable batch size (16 instead of 8)
    num_workers: 4
    target_size: [244, 244]         # RESTORED: Original target size (244 instead of 224)
    spec_augment:
      freq_mask_param: 27
      time_mask_param: 100          # RESTORED: Original strong time mask (100 instead of 30)
      num_freq_masks: 1
      num_time_masks: 1
      prob: 0.5
    pitch_shift:
      prob: 1.0                     # Always run pitch shift (to match bug behavior)
      n_steps_range: [-1.0, 1.0]    # Range is [-1.0, 1.0]
    time_shift:
      prob: 1.0                     # Always run time shift (to match bug behavior)
      range: [0.9, 1.1]

model:
  name: "maxmvit_mlp"
  type: "crossattn"                 # RESTORED: Original Cross-Attention fusion (crossattn instead of gmu)
  num_classes: 4
  hidden_size: 512
  dropout_rate: 0.2
  num_heads: 8
  fusion_type: "concat"

training:
  epochs: 50
  lr: 0.0002                        # RESTORED: Original learning rate (0.0002 instead of 0.00015)
  patience: 10
  seed: 42
  device: "cuda"
  scheduler:
    factor: 0.1
    patience: 3
    min_lr: 1e-6

paths:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
