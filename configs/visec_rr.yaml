experiment_name: "visec_gmu_rr"

dataset:
  name: "visec"
  args:
    hf_id: "hustep-lab/ViSEC"
    batch_size: 8
    num_workers: 4
    target_size: [224, 224] # Paper Size
    spec_augment:
      freq_mask_param: 27   # Max frequency mask width (F in paper)
      time_mask_param: 30   # Max time mask width (T in paper)
      num_freq_masks: 1     # Number of frequency masks
      num_time_masks: 1     # Number of time masks
      prob: 0.5             # Probability of applying SpecAugment (50%)
    pitch_shift:
      prob: 0.0             # Probability of applying pitch shift
      n_steps_range: [-1.0, 1.0] # Pitch shift range in semitones
    time_shift:
      prob: 0.0             # Probability of applying time shift
      range: [0.9, 1.1]     # Time stretch rate range

model:
  name: "maxmvit_mlp"
  type: "gmu"  # Options: original, gmu, crossattn
  num_classes: 4
  hidden_size: 512
  dropout_rate: 0.2
  # Cross-Attention specific
  num_heads: 8
  fusion_type: "concat"  # Options: concat, add, gated

# Auxiliary Task: Region Recognition (RR)
auxiliary_task:
  enabled: true
  task: "accent"
  num_accent_classes: 3              # north, south, mid
  alpha: 0.8                         # Weight for auxiliary loss: L = L_emo + alpha * L_accent
  accent_weights: [0.20, 0.56, 2.24] # Weighted CE: [north=68.5%, south=25.3%, mid=6.27%]

training:
  epochs: 50
  lr: 0.00015 # Paper value (CRITICAL: 0.02)
  patience: 10
  seed: 42
  device: "cuda"
  scheduler:
    factor: 0.1
    patience: 3
    min_lr: 1e-6

paths:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
